<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="../../">
  <title>마법 부여자</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/question.css">
  <style>
    .copy-answer-target {
      color: #a855f7;
      font-weight: 700;
    }

    .enchanter-problem {
      grid-template-rows: minmax(0, 1fr);
    }

    .enchanter-problem .problem-content,
    .enchanter-problem .puzzle-card {
      height: 100%;
    }

    .enchanter-problem .puzzle-card {
      align-content: center;
      justify-items: center;
      min-height: 220px;
      text-align: center;
    }

    .enchanter-problem .puzzle-card h3 {
      color: var(--gold-text);
      font-size: 1.18rem;
      text-shadow: 2px 2px 0 #000;
    }

    .enchanter-problem .puzzle-card p {
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
    }
  </style>
</head>
<body class="question-page">
  <main class="page-shell" id="question-root">
    <header class="top-strip" aria-label="문제 상단 바">
      <div class="top-actions">
        <a class="mc-button dark compact-button" href="index.html" data-interactive="true">LOBBY</a>
      </div>
      <img id="site-logo" class="site-logo pixel-art" src="assets/branding/logo-placeholder.png" alt="ARG 로고">
      <div class="top-links">
        <button class="mc-button dark compact-button" type="button" data-role="audio-toggle"><span data-role="audio-label">SOUND</span></button>
      </div>
    </header>

    <section class="mc-panel title-board" aria-label="문제 개요">
      <div class="title-art">
        <img id="question-frame" class="pixel-art" src="assets/ui/task_open.png" alt="">
        <img id="question-icon" class="pixel-art" src="assets/icons/book.png" alt="">
      </div>
      <div class="title-copy">
        <p class="slot-kicker" id="question-category">CATEGORY</p>
        <h1 id="question-title">마법 부여자</h1>
        <p id="question-subtitle"></p>
      </div>
      <div class="timer-slot">
        <span class="stat-label">TOTAL TIME</span>
        <strong id="total-elapsed">00:00</strong>
      </div>
    </section>

    <section class="solve-stage" aria-label="문제 풀이 영역">
      <article class="mc-panel problem-panel enchanter-problem">
        <div class="problem-content">
          <section class="puzzle-card">
  <h3>마법 부여자의 책</h3>
  <p>문제의 정답은 <span id="decoy-answer" class="copy-answer-target" data-real-answer="To be, or not to be" data-visible-answer="정답">"정답"</span>입니다.</p>
</section>
        </div>
      </article>

      <div class="craft-arrow question-arrow" aria-hidden="true"></div>

      <aside class="mc-panel answer-panel">
        <div class="answer-display">
          <div class="answer-slot">
            <img id="result-frame" class="pixel-art" src="assets/ui/task_open.png" alt="">
            <img id="result-icon" class="pixel-art" src="assets/icons/book.png" alt="">
          </div>
          <h2 class="answer-title">ANSWER</h2>
        </div>

        <div id="locked-message" hidden></div>

        <form class="answer-form" id="answer-form">
          <label class="input-label" for="answer-input">정답 입력</label>
          <input class="mc-input" id="answer-input" name="answer" type="text" autocomplete="off" placeholder="영문 또는 숫자 입력">
          <div class="answer-actions">
            <button class="mc-button gold" type="submit">SUBMIT</button>
            <a class="mc-button blue" id="next-link" href="index.html" hidden>CHECK LOBBY</a>
          </div>
        </form>

        <div class="feedback-board" id="feedback" hidden></div>
      </aside>
    </section>

    <section class="mc-panel hint-rack" aria-label="힌트 패널">
      <div class="hint-head">
        <h2 class="hint-title">HINTS</h2>
        <p id="hint-status">오답 0회</p>
      </div>
      <div id="hint-buttons"></div>
      <div id="hint-output" hidden></div>
    </section>
  </main>

  <script>window.CURRENT_QUESTION_ID = 'story-2';</script>
  <script>
    (() => {
      const decoyAnswer = document.getElementById('decoy-answer');
      if (!decoyAnswer) return;
      const realAnswer = decoyAnswer.dataset.realAnswer || '';
      const visibleAnswer = decoyAnswer.dataset.visibleAnswer || decoyAnswer.textContent || '정답';
      const quotedVisibleAnswer = `"${visibleAnswer}"`;
      const hintOutput = document.getElementById('hint-output');
      const answerPattern = new RegExp(
        quotedVisibleAnswer.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'),
        'g'
      );
      let markingHints = false;

      function markHintAnswers() {
        if (!hintOutput || markingHints) return;
        markingHints = true;

        try {
          const textNodes = [];
          const walker = document.createTreeWalker(hintOutput, NodeFilter.SHOW_TEXT);

          while (walker.nextNode()) {
            const node = walker.currentNode;
            if (
              node.nodeValue.includes(quotedVisibleAnswer) &&
              !node.parentElement?.classList.contains('copy-answer-target')
            ) {
              textNodes.push(node);
            }
          }

          textNodes.forEach((node) => {
            const fragment = document.createDocumentFragment();
            let lastIndex = 0;

            node.nodeValue.replace(answerPattern, (match, offset) => {
              fragment.append(node.nodeValue.slice(lastIndex, offset));

              const marker = document.createElement('span');
              marker.className = 'copy-answer-target';
              marker.textContent = match;
              fragment.append(marker);

              lastIndex = offset + match.length;
              return match;
            });

            fragment.append(node.nodeValue.slice(lastIndex));
            node.replaceWith(fragment);
          });
        } finally {
          markingHints = false;
        }
      }

      document.addEventListener('copy', (event) => {
        const selection = window.getSelection();
        if (!selection || selection.isCollapsed || !event.clipboardData) return;
        const selectedText = selection.toString();
        const ranges = Array.from({ length: selection.rangeCount }, (_, index) =>
          selection.getRangeAt(index)
        );

        const containsDecoy = ranges.some((range) => range.intersectsNode(decoyAnswer));
        const containsHint = hintOutput && ranges.some((range) => range.intersectsNode(hintOutput));

        if ((!containsDecoy && !containsHint) || !selectedText.includes(quotedVisibleAnswer)) return;

        event.preventDefault();
        const trimmedText = selectedText.trim();
        const clipboardText = trimmedText === quotedVisibleAnswer
          ? realAnswer
          : selectedText.split(quotedVisibleAnswer).join(realAnswer);
        event.clipboardData.setData('text/plain', clipboardText);
      });

      markHintAnswers();
      if (hintOutput) {
        new MutationObserver(markHintAnswers).observe(hintOutput, {
          childList: true,
          subtree: true
        });
      }

      const answerForm = document.getElementById('answer-form');
      const answerInput = document.getElementById('answer-input');
      answerForm?.addEventListener('submit', () => {
        const typedAnswer = answerInput?.value || '';
        if (typedAnswer === realAnswer || !window.ARGUtils?.matchesAnswer(typedAnswer, [realAnswer])) return;

        answerInput.value = '__not_exact_answer__';
        window.setTimeout(() => {
          if (answerInput.value === '__not_exact_answer__') {
            answerInput.value = typedAnswer;
          }
        }, 0);
      }, true);
    })();
  </script>
  <script src="js/game-data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/state.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/question-page.js"></script>
</body>
</html>
