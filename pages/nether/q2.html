<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="../../">
  <title>강태공이 세월을 낚듯</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/question.css">
  <style>
    .time-fisher-panel .problem-content {
      min-height: 300px;
    }

    .time-fisher-card {
      min-height: 300px;
      align-content: center;
      justify-items: center;
      text-align: center;
      gap: 18px;
    }

    .time-fisher-clock {
      width: min(100%, 520px);
      padding: 28px 18px;
      color: #fff;
      background: linear-gradient(180deg, rgba(12, 13, 16, 0.98), rgba(4, 5, 7, 0.98));
      border: 4px solid #000;
      box-shadow:
        inset 3px 3px 0 rgba(255, 255, 255, 0.12),
        inset -3px -3px 0 rgba(0, 0, 0, 0.42),
        0 12px 24px rgba(0, 0, 0, 0.26);
      font-family: "MonocraftWeb", "Galmuri11", monospace;
      font-size: clamp(2.2rem, 8vw, 5rem);
      line-height: 1;
      text-shadow: 4px 4px 0 #000;
      letter-spacing: 0;
    }

    .time-fisher-state {
      min-height: 28px;
      color: rgba(255, 255, 255, 0.86);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .time-fisher-page .answer-form {
      display: none;
    }
  </style>
</head>
<body class="question-page time-fisher-page">
  <main class="page-shell" id="question-root">
    <header class="top-strip" aria-label="문제 상단 바">
      <div class="top-actions">
        <a class="mc-button dark compact-button" href="index.html" data-interactive="true">LOBBY</a>
      </div>
      <img id="site-logo" class="site-logo pixel-art" src="assets/branding/logo-placeholder.png" alt="ARG 로고">
      <div class="top-links">
        <button class="mc-button dark compact-button" type="button" data-role="audio-toggle"><span data-role="audio-label">SOUND</span></button>
      </div>
    </header>

    <section class="mc-panel title-board" aria-label="문제 개요">
      <div class="title-art">
        <img id="question-frame" class="pixel-art" src="assets/ui/task_open.png" alt="">
        <img id="question-icon" class="pixel-art" src="assets/icons/fishing_rod.png" alt="">
      </div>
      <div class="title-copy">
        <p class="slot-kicker" id="question-category">CATEGORY</p>
        <h1 id="question-title">강태공이 세월을 낚듯</h1>
        <p id="question-subtitle"></p>
      </div>
      <div class="timer-slot">
        <span class="stat-label">TOTAL TIME</span>
        <strong id="total-elapsed">00:00</strong>
      </div>
    </section>

    <section class="solve-stage" aria-label="문제 풀이 영역">
      <article class="mc-panel problem-panel time-fisher-panel">
        <div class="problem-header">
          <h2 class="problem-title">PUZZLE</h2>
          <span class="status-pill">TIME FISHER</span>
        </div>
        <div class="problem-content">
          <section class="puzzle-card time-fisher-card">
            <div class="time-fisher-clock" id="time-fisher-clock" aria-live="polite">12:00:00</div>
            <div class="time-fisher-state" id="time-fisher-state"></div>
          </section>
        </div>
      </article>

      <div class="craft-arrow question-arrow" aria-hidden="true"></div>

      <aside class="mc-panel answer-panel">
        <div class="answer-display">
          <div class="answer-slot">
            <img id="result-frame" class="pixel-art" src="assets/ui/task_open.png" alt="">
            <img id="result-icon" class="pixel-art" src="assets/icons/fishing_rod.png" alt="">
          </div>
          <h2 class="answer-title">TIME</h2>
        </div>

        <div id="locked-message" hidden></div>

        <form class="answer-form" id="answer-form">
          <label class="input-label" for="answer-input">정답 입력</label>
          <input class="mc-input" id="answer-input" name="answer" type="text" autocomplete="off" placeholder="">
          <div class="answer-actions">
            <button class="mc-button gold" type="submit">SUBMIT</button>
            <a class="mc-button blue" id="next-link" href="index.html" hidden>CHECK LOBBY</a>
          </div>
        </form>

        <div class="feedback-board" id="feedback" hidden></div>
        <a class="mc-button blue" id="next-link-visual" href="index.html" hidden>CHECK LOBBY</a>
      </aside>
    </section>

    <section class="mc-panel hint-rack" aria-label="힌트 패널">
      <div class="hint-head">
        <h2 class="hint-title">HINTS</h2>
        <p id="hint-status">오답 0회</p>
      </div>
      <div id="hint-buttons"></div>
      <div id="hint-output" hidden></div>
    </section>
  </main>

  <script>window.CURRENT_QUESTION_ID = 'nether-2';</script>
  <script src="js/game-data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/state.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/question-page.js"></script>
  <script>
    (() => {
      const QUESTION_ID = 'nether-2';
      const DURATION_MS = 12 * 60 * 60 * 1000;
      const storageKey = `${window.ARGData.storageKey}:time-fisher-start`;

      function formatRemaining(ms) {
        const totalSeconds = Math.max(0, Math.ceil(ms / 1000));
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        return [hours, minutes, seconds].map((part) => String(part).padStart(2, '0')).join(':');
      }

      function getStartTime() {
        const saved = Number(window.localStorage.getItem(storageKey) || 0);
        if (Number.isFinite(saved) && saved > 0) return saved;

        const now = Date.now();
        window.localStorage.setItem(storageKey, String(now));
        return now;
      }

      function revealNextLink() {
        const hiddenLink = document.getElementById('next-link');
        const visualLink = document.getElementById('next-link-visual');
        const nextQuestion = window.ARGState.getNextPlayableQuestion(QUESTION_ID);

        if (!visualLink) return;
        visualLink.hidden = false;
        visualLink.href = nextQuestion?.file || 'index.html';
        visualLink.textContent = nextQuestion ? `NEXT SLOT · ${nextQuestion.title}` : 'CHECK LOBBY';

        if (hiddenLink) {
          hiddenLink.hidden = false;
          hiddenLink.href = visualLink.href;
          hiddenLink.textContent = visualLink.textContent;
        }
      }

      function completePuzzle() {
        if (!window.ARGState.isQuestionSolved(QUESTION_ID)) {
          window.ARGState.markSolved(QUESTION_ID);
          window.ARGAudio?.playEffect('success', { volume: 1 });
          window.ARGEffects?.showToast({
            title: 'CHALLENGE COMPLETE',
            text: '강태공이 세월을 낚듯',
            icon: window.ARGData.assets.icons.fishingRod,
            frameType: 'challenge',
            playSound: false
          });
        }

        const clock = document.getElementById('time-fisher-clock');
        const stateText = document.getElementById('time-fisher-state');
        const feedback = document.getElementById('feedback');
        const questionFrame = document.getElementById('question-frame');
        const resultFrame = document.getElementById('result-frame');

        if (clock) clock.textContent = '00:00:00';
        if (stateText) stateText.textContent = '시간이 다 흘렀습니다.';
        if (feedback) {
          feedback.hidden = false;
          feedback.textContent = '정답입니다. 진행 상태가 저장되었습니다.';
          feedback.className = 'feedback-board success';
        }
        if (questionFrame) questionFrame.src = window.ARGUtils.getFrameSrc('challenge', true);
        if (resultFrame) resultFrame.src = window.ARGUtils.getFrameSrc('challenge', true);
        revealNextLink();
      }

      function updateCountdown(startTime) {
        if (!window.ARGState.isQuestionUnlocked(QUESTION_ID) && !window.ARGState.isQuestionSolved(QUESTION_ID)) {
          return;
        }

        if (window.ARGState.isQuestionSolved(QUESTION_ID)) {
          completePuzzle();
          return;
        }

        const remaining = DURATION_MS - (Date.now() - startTime);
        const clock = document.getElementById('time-fisher-clock');
        if (clock) clock.textContent = formatRemaining(remaining);

        if (remaining <= 0) {
          completePuzzle();
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        const startTime = getStartTime();
        updateCountdown(startTime);
        window.setInterval(() => updateCountdown(startTime), 1000);
      });
    })();
  </script>
</body>
</html>
