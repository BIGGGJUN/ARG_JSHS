<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="../../">
  <title>Sound of music</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/question.css">
  <style>
    .sound-music-panel .problem-content {
      gap: 16px;
    }

    .sound-music-card {
      align-content: start;
      gap: 16px;
    }

    .sound-music-card h3 {
      color: var(--gold-text);
      font-size: 1.2rem;
      text-shadow: 2px 2px 0 #000;
    }

    .music-note-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(54px, 1fr));
      gap: 10px;
      align-items: center;
    }

    .music-note {
      min-height: 76px;
      border: 3px solid #000;
      color: #fff;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.7);
      background: linear-gradient(180deg, #786c5b, #3e3429);
      box-shadow:
        inset 3px 3px 0 rgba(255, 255, 255, 0.24),
        inset -3px -3px 0 rgba(0, 0, 0, 0.32),
        0 8px 18px rgba(0, 0, 0, 0.24);
      transition: transform 0.08s steps(2), filter 0.12s linear;
    }

    .music-note:hover {
      filter: brightness(1.08);
      transform: translateY(-2px);
    }

    .music-note:active,
    .music-note.played {
      filter: brightness(1.2);
      transform: translateY(2px);
    }

    .music-note-icon {
      display: block;
      width: 34px;
      height: 34px;
      margin: 0 auto;
    }

    .click-note {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 72;
      pointer-events: none;
      color: var(--pixel-color, var(--accent));
      font-family: "Galmuri11", "MonocraftWeb", monospace;
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
      text-shadow:
        2px 2px 0 rgba(0, 0, 0, 0.72),
        0 0 10px var(--pixel-color, var(--accent));
      animation: noteBurst 0.78s cubic-bezier(.12,.64,.35,1) forwards;
    }

    @keyframes noteBurst {
      from {
        transform: translate(-50%, -50%) scale(0.72) rotate(0deg);
        opacity: 1;
      }

      to {
        transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.65) rotate(var(--spin));
        opacity: 0;
      }
    }

    @media (max-width: 760px) {
      .music-note-grid {
        grid-template-columns: repeat(4, minmax(58px, 1fr));
      }
    }

    @media (max-width: 420px) {
      .music-note-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body class="question-page">
  <main class="page-shell" id="question-root">
    <header class="top-strip" aria-label="문제 상단 바">
      <div class="top-actions">
        <a class="mc-button dark compact-button" href="index.html" data-interactive="true">LOBBY</a>
      </div>
      <img id="site-logo" class="site-logo pixel-art" src="assets/branding/logo-placeholder.png" alt="ARG 로고">
      <div class="top-links">
        <button class="mc-button dark compact-button" type="button" data-role="audio-toggle"><span data-role="audio-label">SOUND</span></button>
      </div>
    </header>

    <section class="mc-panel title-board" aria-label="문제 개요">
      <div class="title-art">
        <img id="question-frame" class="pixel-art" src="assets/ui/task_open.png" alt="">
        <img id="question-icon" class="pixel-art" src="assets/icons/note_block.png" alt="">
      </div>
      <div class="title-copy">
        <p class="slot-kicker" id="question-category">CATEGORY</p>
        <h1 id="question-title">Sound of music</h1>
        <p id="question-subtitle"></p>
      </div>
      <div class="timer-slot">
        <span class="stat-label">TOTAL TIME</span>
        <strong id="total-elapsed">00:00</strong>
      </div>
    </section>

    <section class="solve-stage" aria-label="문제 풀이 영역">
      <article class="mc-panel problem-panel sound-music-panel">
        <div class="problem-header">
          <h2 class="problem-title">PUZZLE</h2>
          <span class="status-pill">RAINBOW NOTES</span>
        </div>
        <div class="problem-content">
          <section class="puzzle-card sound-music-card">
            <h3>Sound of music</h3>
            <div class="music-note-grid" id="music-note-grid" aria-label="무지개 음표">
              <button class="music-note" type="button" data-note-color="red" data-note-name="도" data-frequency="261.63" data-pixel-color="#ff4d4d" data-effect-shape="note" aria-label="노트블럭 1">
                <img class="music-note-icon pixel-art" src="assets/icons/note_block.png" alt="">
              </button>
              <button class="music-note" type="button" data-note-color="orange" data-note-name="도" data-frequency="261.63" data-pixel-color="#ff9f1c" data-effect-shape="note" aria-label="노트블럭 2">
                <img class="music-note-icon pixel-art" src="assets/icons/note_block.png" alt="">
              </button>
              <button class="music-note" type="button" data-note-color="yellow" data-note-name="솔" data-frequency="392.00" data-pixel-color="#ffe45e" data-effect-shape="note" aria-label="노트블럭 3">
                <img class="music-note-icon pixel-art" src="assets/icons/note_block.png" alt="">
              </button>
              <button class="music-note" type="button" data-note-color="green" data-note-name="솔" data-frequency="392.00" data-pixel-color="#51cf66" data-effect-shape="note" aria-label="노트블럭 4">
                <img class="music-note-icon pixel-art" src="assets/icons/note_block.png" alt="">
              </button>
              <button class="music-note" type="button" data-note-color="blue" data-note-name="라" data-frequency="440.00" data-pixel-color="#339af0" data-effect-shape="note" aria-label="노트블럭 5">
                <img class="music-note-icon pixel-art" src="assets/icons/note_block.png" alt="">
              </button>
              <button class="music-note" type="button" data-note-color="indigo" data-note-name="라" data-frequency="440.00" data-pixel-color="#5c7cfa" data-effect-shape="note" aria-label="노트블럭 6">
                <img class="music-note-icon pixel-art" src="assets/icons/note_block.png" alt="">
              </button>
              <button class="music-note" type="button" data-note-color="violet" data-note-name="솔" data-frequency="392.00" data-pixel-color="#cc5de8" data-effect-shape="note" aria-label="노트블럭 7">
                <img class="music-note-icon pixel-art" src="assets/icons/note_block.png" alt="">
              </button>
            </div>
          </section>
        </div>
      </article>

      <div class="craft-arrow question-arrow" aria-hidden="true"></div>

      <aside class="mc-panel answer-panel">
        <div class="answer-display">
          <div class="answer-slot">
            <img id="result-frame" class="pixel-art" src="assets/ui/task_open.png" alt="">
            <img id="result-icon" class="pixel-art" src="assets/icons/note_block.png" alt="">
          </div>
          <h2 class="answer-title">ANSWER</h2>
        </div>

        <div id="locked-message" hidden></div>

        <form class="answer-form" id="answer-form">
          <label class="input-label" for="answer-input">정답 입력</label>
          <input class="mc-input" id="answer-input" name="answer" type="text" autocomplete="off" lang="ko" placeholder="한글로 입력">
          <div class="answer-actions">
            <button class="mc-button gold" type="submit">SUBMIT</button>
            <a class="mc-button blue" id="next-link" href="index.html" hidden>CHECK LOBBY</a>
          </div>
        </form>

        <div class="feedback-board" id="feedback" hidden></div>
      </aside>
    </section>

    <section class="mc-panel hint-rack" aria-label="힌트 패널">
      <div class="hint-head">
        <h2 class="hint-title">HINTS</h2>
        <p id="hint-status">오답 0회</p>
      </div>
      <div id="hint-buttons"></div>
      <div id="hint-output" hidden></div>
    </section>
  </main>

  <script>window.CURRENT_QUESTION_ID = 'nether-1';</script>
  <script src="js/game-data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/state.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/question-page.js"></script>
</body>
</html>
